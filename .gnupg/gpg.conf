# GnuPG options — see `man gpg` for the full list.

# Suppress the copyright notice and the version line in output.
no-greeting
no-emit-version

# Route key operations through gpg-agent.
use-agent

# Default key for standalone gpg (signing/encryption) and SSH auth via gpg-agent
# (see sshcontrol). Git commit signing does NOT use this key — git signs with
# ssh-ed25519; see ~/.gitconfig [gpg] format = ssh.
default-key C248DE6357445D6302F9A62E74BFD03C20CC21AF

# Require a valid cross-certification "back signature" on signing subkeys
# (protects against a subtle attack on signing-capable subkeys).
require-cross-certification

# Native charset for metadata.
charset utf-8

# Prefer strong digests for signatures and key certifications.
cert-digest-algo SHA512
personal-digest-preferences SHA512 SHA384 SHA256 SHA224
default-preference-list SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES CAST5 ZLIB BZIP2 ZIP Uncompressed

# No keyserver / auto-key-locate configured: the old SKS pool is defunct, and
# auto-key-retrieve would fetch signer-chosen keys on verify. gpg's default
# auto-key-locate (local,wkd) is used implicitly when a key lookup is needed.
