# Cross-platform CLI utilities the shell config depends on. This is the global
# mise config, loaded everywhere (workstation + Linux fleet), so a bare
# `mise install` on a server installs exactly these — no apt name quirks like
# fdfind/batcat, no per-release gaps (e.g. jammy's ancient zoxide 0.4.3).
# Everything except eza uses the aqua backend (prebuilt, checksum- and
# attestation-verified). Language runtimes are NOT here: they live in the
# mac-only config.mac.toml (loaded via MISE_ENV=mac), kept off the fleet because
# ruby compiles from source via ruby-build and the servers lack the build deps.
#
# fzf, ripgrep, jq and uv back interactive shell pieces in the dotfiles (the
# atuin Ctrl-R widget, the csearch transcript browser, the statusline and the
# aws/minio credential_process helpers). uv is pinned here (and dropped from
# ~/.default-python-packages) so a single mise-managed copy is the one on PATH —
# the former pip-into-python copy shadow-raced it — and so uv reaches the fleet
# too, which has no mise python. fzf comes from here entirely now: binary +
# `fzf --zsh` keybindings/completion (wired in .zshrc after `mise activate`),
# replacing the old ~/.zsh/fzf git submodule (dropped — vim's `:FZF` went with it).
#
# eza is pinned to the asdf plugin, not aqua/ubi/github: eza ships no macOS
# release asset, so every GitHub-asset backend fails on darwin. The asdf plugin
# downloads prebuilt binaries on both platforms (Linux: eza's official release;
# macOS: cargo-quickinstall's), but unlike aqua it does NOT verify a checksum —
# an accepted pragmatic gap. Pinned to the explicit backend so resolution can't
# drift to the darwin-broken aqua one.
[tools]
fd = "10.4.2"
bat = "0.26.1"
zoxide = "0.9.9"
atuin = "18.16.1"
delta = "0.19.2"
fzf = "0.73.1"
ripgrep = "15.1.0"
jq = "1.8.1"
uv = "0.11.16"
"asdf:mise-plugins/mise-eza" = "0.23.4"

# zsh + vim plugins, pulled from pinned GitHub tag tarballs via the http backend
# (these replace the former git submodules — mise has no backend that installs
# source-only repos otherwise, but http fetches any tarball). .zshrc sources the
# zsh ones and .vimrc rtp-adds the vim ones from each tool's mise install dir;
# strip_components=1 drops the archive's top <repo>-<tag> wrapper dir.
"http:pure" = { version = "v1.28.1", url = "https://github.com/sindresorhus/pure/archive/refs/tags/{{version}}.tar.gz", strip_components = 1 }
"http:zsh-autosuggestions" = { version = "v0.7.1", url = "https://github.com/zsh-users/zsh-autosuggestions/archive/refs/tags/{{version}}.tar.gz", strip_components = 1 }
"http:zsh-syntax-highlighting" = { version = "0.8.0-alpha1-pre-redrawhook", url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/refs/tags/{{version}}.tar.gz", strip_components = 1 }
"http:vim-surround" = { version = "v2.2", url = "https://github.com/tpope/vim-surround/archive/refs/tags/{{version}}.tar.gz", strip_components = 1 }
"http:vim-commentary" = { version = "v1.3", url = "https://github.com/tpope/vim-commentary/archive/refs/tags/{{version}}.tar.gz", strip_components = 1 }
# vim-repeat's last tag (v1.2) predates its plugin/repeat.vim — the `.`-repeat
# hook lives there, not in autoload — so pin the commit (matches the old submodule).
"http:vim-repeat" = { version = "6584602", url = "https://github.com/tpope/vim-repeat/archive/{{version}}.tar.gz", strip_components = 1 }

[settings]

[settings.ruby]
compile = false
