# Atuin config — overrides only. Unset keys use atuin's compiled-in defaults.
# Full annotated reference: https://docs.atuin.sh/configuration/config/

## "us" or "uk" date format.
dialect = "uk"

## With workspace filtering, match commands run anywhere in a git repo tree.
workspaces = true

## Filter mode when invoked from the shell up-key binding.
filter_mode_shell_up_key_binding = "workspace"

## Startup filter mode is search.filters[0] below ("session"); kept in sync here.
filter_mode = "session"

## Max lines the interactive UI occupies.
inline_height = 14

## Follow the shell's keymap (vi vs emacs) for the search UI bindings.
keymap_mode = "auto"

## Context lines kept around the selected entry in the inline UI.
scroll_context_lines = 1

## Hide the search/inspect tabs row.
show_tabs = false

## Enter edits the command in the prompt rather than executing immediately.
enter_accept = false

## Redaction. secrets_filter (default on, pinned here as the SOLE secret guard)
## catches AWS/GitHub/Slack/Stripe shapes before they reach the SQLite store.
## history_filter below only declutters no-op commands — it is NOT a secret
## filter: a whole-line-drop regex can't reliably catch every credential shape
## (--password=x, lowercase api_key=, URL creds, X-Api-Key: ...), so don't lean
## on it — keep secrets out of argv (use *_FILE / stdin) instead.
secrets_filter = true
history_filter = [
    "^(ls|ll|la|pwd|clear|cd|(cd -)|(cd ..)|tig|dotfiles-tig|claude|exit|(podman ps)|(echo $?)|(git remote -v)|(git br))$",
]

[search]
## Enabled filter modes in priority order; [0] is the startup default.
filters = [ "session", "workspace", "directory", "host" ]

[stats]
## Group `atuin stats` by the real command, not the wrapper binary.
common_subcommands = [ "git", "podman", "mise", "cargo", "go" ]

[ai]
enabled = false
