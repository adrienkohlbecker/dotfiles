# Atuin config — overrides only. Unset keys use atuin's compiled-in defaults.
# Full annotated reference: https://docs.atuin.sh/configuration/config/

## "us" or "uk" date format.
dialect = "uk"

## With workspace filtering, match commands run anywhere in a git repo tree.
workspaces = true

## Filter mode when invoked from the shell up-key binding.
filter_mode_shell_up_key_binding = "workspace"

## Startup filter mode is search.filters[0] below ("session"); kept in sync here.
filter_mode = "session"

## Max lines the interactive UI occupies.
inline_height = 14

## Hide the search/inspect tabs row.
show_tabs = false

## Enter edits the command in the prompt rather than executing immediately.
enter_accept = false

## Redaction. secrets_filter (default on, but pinned here) catches AWS/GitHub/
## Slack/Stripe shapes; history_filter additionally drops no-op commands and
## anything carrying an obvious credential before it reaches the SQLite store.
secrets_filter = true
history_filter = [
    "^(ls|ll|la|pwd|clear|cd|(cd -)|(cd ..)|tig|dotfiles-tig|claude|exit|(podman ps)|(echo $?)|(git remote -v)|(git br))$",
    "(--?password|--?token|_TOKEN=|_SECRET=|Authorization:|Bearer |op://)",
]

[sync]
## Sync v2 record format.
records = true

[search]
## Enabled filter modes in priority order; [0] is the startup default.
filters = [ "session", "workspace", "directory", "host" ]

[ai]
enabled = false
